<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#faviconGradient)" filter="url(#shadow)"/>
  
  <!-- Medical cross (white) -->
  <rect x="26" y="18" width="12" height="28" rx="2" fill="white"/>
  <rect x="18" y="26" width="28" height="12" rx="2" fill="white"/>
  
  <!-- AI circuit dot in center -->
  <circle cx="32" cy="32" r="4" fill="url(#faviconGradient)"/>
  
  <!-- Circuit lines -->
  <line x1="32" y1="12" x2="32" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="32" y1="46" x2="32" y2="52" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="12" y1="32" x2="18" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="46" y1="32" x2="52" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
