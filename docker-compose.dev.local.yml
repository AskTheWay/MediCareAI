services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: medicare_postgres
    environment:
      POSTGRES_DB: medicareai
      POSTGRES_USER: medicare_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicare123456}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - medicare_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicare_user -d medicareai"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7.4-alpine
    container_name: medicare_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123456}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - medicare_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - USE_CN_MIRROR=${USE_CN_MIRROR:-false}
    container_name: medicare_backend
    command: ["--reload"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://medicare_user:${POSTGRES_PASSWORD:-medicare123456}@medicare_postgres:5432/medicareai
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123456}@medicare_redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-http://localhost:8033/v1/}
      DEBUG: "true"
      POSTGRES_HOST: medicare_postgres
      POSTGRES_USER: medicare_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicare123456}
      POSTGRES_DB: medicareai
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend:/app
      - ./.env:/app/.env
      - uploads_data:/app/uploads
      - kb_data:/app/data/knowledge_bases
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - medicare_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    image: node:20-alpine
    container_name: medicare_frontend
    working_dir: /app
    environment:
      - CHOKIDAR_USE_POLLING=true
      - ESLINT_NO_CACHE=true
    command: sh -c "[ -f node_modules/.bin/vite ] || npm install; npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - medicare_network
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: medicare_nginx
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:8081:8081"
    volumes:
      - ./docker/nginx/nginx-dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - medicare_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  kb_data:
  frontend_node_modules:

networks:
  medicare_network:
    driver: bridge
